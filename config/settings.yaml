# =========================================================
# BIST BOT - MERKEZI KONFIGURASYON
# Yeni bir hisse eklemek icin SADECE "tickers" listesine
# yeni bir blok eklemen yeterli. Kod tarafinda hicbir yeri
# degistirmene gerek yok (mimari tamamen ticker-agnostic).
# =========================================================

tickers:
  - symbol: "ASELS"          # BIST kodu (KAP / Matriks / Takasbank vs. bu kodu kullanir)
    yahoo_symbol: "ASELS.IS" # yfinance / Yahoo Finance icin uzanti
    name: "Aselsan"
    sector: "Savunma Sanayii"
    enabled: true

  # Yeni hisse eklemek icin ornek (yorum satirini acip doldurman yeterli):
  # - symbol: "THYAO"
  #   yahoo_symbol: "THYAO.IS"
  #   name: "Turk Hava Yollari"
  #   sector: "Havacilik"
  #   enabled: true

# ---------------------------------------------------------
# Veri kaynaklari - hangi modulun kullanilacagi, gerekirse
# API anahtarlari (gercek anahtarlari .env dosyasina koy,
# burada sadece hangi kaynagin AKTIF oldugunu belirt)
# ---------------------------------------------------------
data_sources:
  price:
    provider: "tradingview"          # "yahoo", "algolab", veya "tradingview"
    # Bot TUM bu zaman dilimlerini birlikte okur (coklu zaman dilimi analizi):
    timeframes:
      - interval: "5m"
        lookback_days: 10
      - interval: "15m"
        lookback_days: 20
      - interval: "1h"          # ara teyit katmani (skora dahil degil, filtre)
        lookback_days: 60
      - interval: "1d"          # ana trend katmani (gunluk trend vetosu icin sart)
        lookback_days: 365

  news:
    provider: "kap"             # KAP - resmi ve en guvenilir kaynak
    poll_interval_minutes: 15

  depth:
    provider: "none"            # broker API baglanana kadar pasif (ornek: "algolab")
    enabled: false

  akd_takas:
    provider: "none"            # ileride Takasbank/Matriks entegre edilecek
    enabled: false

# ---------------------------------------------------------
# Analiz agirliklari - karar motoru bu agirliklarla
# tum sinyalleri birlestirip tek bir skor uretir (-1..+1)
# Toplamlari 1.0 olacak sekilde ayarlanmalidir.
# ---------------------------------------------------------
scoring_weights:
  technical: 0.45
  news_sentiment: 0.25
  fundamental: 0.15
  depth: 0.10
  akd_takas: 0.05

# ---------------------------------------------------------
# Karar esikleri
# ---------------------------------------------------------
decision_thresholds:
  buy: 0.15      # Eskiden 0.30'du. Artik cok kucuk bir yukselis sinyalinde hemen AL diyecek
  sell: -0.15    # Eskiden -0.30'du. Artik %1-2'lik dusus hissettiginde aninda SAT diyecek
  # arasi -> TUT

# ---------------------------------------------------------
# Depolama
# ---------------------------------------------------------
storage:
  type: "sqlite"
  path: "data_store/bist_bot.db"

# ---------------------------------------------------------
# Risk yonetimi (backtest ve ileride execution icin)
# ---------------------------------------------------------
risk:
  max_position_pct: 0.20     # portfoyun en fazla %20'si tek hissede
  take_profit_pct: 0.04      # Esnek Hedef: %4 kâr beklentisi (Momentum kırılırsa daha erken SAT verebilir)
  stop_loss_pct: 0.02        # Koruma: %2 terste kalırsa ana parayı korumak için zararı kes

# ---------------------------------------------------------
# Seans (BIST 10:00 - 18:00) davranisi
# ---------------------------------------------------------
session:
  respect_market_hours: true      # seans disinda aksiyon onerme
  avoid_after_open_min: 15        # acilistan sonra ilk 15 dk pozisyon acma
  avoid_before_close_min: 20      # kapanisa 20 dk kala yeni pozisyon acma
  force_close_before_min: 10      # kapanisa 10 dk kala pozisyonlari kapat
  intraday_only: true             # gece pozisyon tasima (gap riski)

# ---------------------------------------------------------
# AI Beyin (NVIDIA NIM API)
# ---------------------------------------------------------
ai:
  enabled: true
  provider: "nvidia"                                      # nvidia, openai, anthropic
  model: "meta/llama-3.1-70b-instruct"                    # NVIDIA NIM ucretsiz modeli
  temperature: 0.1        # Dusuk = tutarli kararlar, yuksek = yaratici
  fallback_to_math: true  # AI cokerse matematik motora geri dus
